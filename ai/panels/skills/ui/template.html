<div class="ws-skills-columns">

  <!-- Column 1: Local -->
  <div class="ws-skill-column ws-col-local">
    <div class="ws-skill-column-header">
      <span class="ws-skill-column-label">
        <span class="material-symbols-outlined">folder_open</span>
        Local
      </span>
      <span class="ws-skill-column-count" data-count="local">—</span>
    </div>
    <div class="ws-skill-column-body" data-list="local"></div>
    <div class="ws-skill-column-status">
      <span class="ws-status-dot ws-dot-pending"></span>
      <span data-status="local">scanning...</span>
    </div>
  </div>

  <!-- Column 2: Kimi -->
  <div class="ws-skill-column ws-col-kimi">
    <div class="ws-skill-column-header">
      <span class="ws-skill-column-label">
        <span class="material-symbols-outlined">terminal</span>
        Kimi
      </span>
      <span class="ws-skill-column-count" data-count="kimi">—</span>
    </div>
    <div class="ws-skill-column-body" data-list="kimi"></div>
    <div class="ws-skill-column-status">
      <span class="ws-status-dot ws-dot-pending"></span>
      <span data-status="kimi">connecting...</span>
    </div>
  </div>

  <!-- Column 3: Claude -->
  <div class="ws-skill-column ws-col-claude">
    <div class="ws-skill-column-header">
      <span class="ws-skill-column-label">
        <span class="material-symbols-outlined">auto_awesome</span>
        Claude
      </span>
      <span class="ws-skill-column-count" data-count="claude">—</span>
    </div>
    <div class="ws-skill-column-body" data-list="claude"></div>
    <div class="ws-skill-column-status">
      <span class="ws-status-dot ws-dot-disconnected"></span>
      <span data-status="claude">not connected</span>
    </div>
  </div>

</div>
